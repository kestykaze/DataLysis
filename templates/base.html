<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datalysis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">

            <!-- LOGO + NOM -->
            <a class="navbar-brand" href="/">
                <!-- Option A : logo image (décommente si tu as un fichier logo.png dans static/) -->
                <!-- <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" width="28" height="28" style="border-radius:7px; margin-right:6px;"> -->

                <!-- Option B : icône SVG intégrée (déjà stylée, pas besoin d'image) -->
                <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0; margin-right:6px;">
                    <rect width="28" height="28" rx="8" fill="url(#grad)"/>
                    <rect x="6" y="16" width="4" height="7" rx="2" fill="white" opacity="0.9"/>
                    <rect x="12" y="10" width="4" height="13" rx="2" fill="white"/>
                    <rect x="18" y="6" width="4" height="17" rx="2" fill="white" opacity="0.7"/>
                    <defs>
                        <linearGradient id="grad" x1="0" y1="0" x2="28" y2="28" gradientUnits="userSpaceOnUse">
                            <stop offset="0%" stop-color="#4f8ef7"/>
                            <stop offset="100%" stop-color="#a855f7"/>
                        </linearGradient>
                    </defs>
                </svg>
                Datalysis
            </a>

            <!-- MENU -->
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/">Accueil</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/creer">Nouveau projet</a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- CONTENU -->
    <main class="container mt-4">
        {% block content %}
        {% endblock %}
    </main>

    <!-- FOOTER -->
    <footer class="mt-5 py-3">
        <div class="container text-center">
            <small>Datalysis — Application de collecte et analyse de données</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
